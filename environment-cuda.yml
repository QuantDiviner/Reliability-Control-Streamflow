# Ubuntu Linux / NVIDIA GPU 环境
# 适用于: Ubuntu Linux + NVIDIA GPU (CUDA 12.1)
# 创建: conda env create -f environment-cuda.yml
# 激活: conda activate hscc-hydrology
#
# 注意: 需要先安装 CUDA 驱动 (>=525) 和 CUDA Toolkit 12.x
# 验证 GPU: python -c "import torch; print(torch.cuda.is_available())"

name: hscc-hydrology

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # PyTorch with CUDA 12.1 (NVIDIA GPU)
  - pytorch::pytorch>=2.1
  - pytorch::torchvision
  - pytorch::pytorch-cuda=12.1

  # 核心科学计算 (numpy<2.0 — PyTorch 2.x 编译兼容性)
  - numpy>=1.24,<2.0
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.3

  # 水文/地理数据
  - xarray>=2023.1
  - netcdf4>=1.6
  - h5py>=3.9

  # NeuralHydrology 依赖
  - numba>=0.57
  - ruamel.yaml>=0.17
  - tensorboard>=2.13
  - tqdm>=4.65
  - matplotlib>=3.7
  - seaborn>=0.12

  # Jupyter (远程访问)
  - jupyterlab>=4.0
  - ipykernel
  - jupyter-server-proxy  # 方便 SSH tunnel 访问

  - pip
  - pip:
    - mapie>=0.8.0
    - crepes>=0.6.0
    - hydroeval>=0.1.0
