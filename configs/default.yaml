# ============================================================================
# 默认配置文件
# ============================================================================
# 此文件定义实验的默认配置
# 特定实验可以在 experiments/expXXX/config.yaml 中覆盖这些设置
# ============================================================================

# ----------------------------------------------------------------------------
# 项目信息
# ----------------------------------------------------------------------------
project:
  name: "[项目名称]"
  version: "1.0.0"

# ----------------------------------------------------------------------------
# 随机种子 (可复现性)
# ----------------------------------------------------------------------------
seed:
  python: 42
  numpy: 42
  torch: 42
  cuda_deterministic: true

# ----------------------------------------------------------------------------
# 数据配置
# ----------------------------------------------------------------------------
data:
  # 数据路径
  raw_dir: "data/raw"
  processed_dir: "data/processed"

  # 数据分割
  split:
    train: 0.8
    val: 0.1
    test: 0.1
    seed: 42

  # 数据加载
  batch_size: 32
  num_workers: 4
  pin_memory: true

# ----------------------------------------------------------------------------
# 模型配置
# ----------------------------------------------------------------------------
model:
  # TODO: 定义你的模型参数
  name: "model_name"
  # hidden_dim: 64
  # num_layers: 3
  # dropout: 0.1

# ----------------------------------------------------------------------------
# 训练配置
# ----------------------------------------------------------------------------
training:
  epochs: 100

  # 优化器
  optimizer:
    name: "adam"
    lr: 1e-3
    weight_decay: 1e-4

  # 学习率调度
  scheduler:
    name: "cosine"
    warmup_epochs: 5
    min_lr: 1e-6

  # 早停
  early_stopping:
    patience: 10
    min_delta: 1e-4

  # 检查点
  checkpoint:
    save_every: 10
    keep_last: 3

# ----------------------------------------------------------------------------
# 评估配置
# ----------------------------------------------------------------------------
evaluation:
  metrics:
    - "accuracy"
    - "f1"

  # 评估频率
  eval_every: 1  # epochs

# ----------------------------------------------------------------------------
# 日志配置
# ----------------------------------------------------------------------------
logging:
  level: "INFO"
  save_dir: "logs"

  # 可选: 实验追踪工具
  # wandb:
  #   project: "[项目名称]"
  #   entity: "[用户名]"

# ----------------------------------------------------------------------------
# 硬件配置
# ----------------------------------------------------------------------------
device:
  gpu: [0]  # GPU 索引，或 "cpu"
  mixed_precision: false

# ============================================================================
# 使用说明
# ============================================================================
# 1. 命令行覆盖:
#    python train.py --config configs/default.yaml --training.epochs 200
#
# 2. 实验特定配置:
#    在 experiments/expXXX/config.yaml 中只写需要修改的参数
#    脚本会自动合并默认配置
# ============================================================================
