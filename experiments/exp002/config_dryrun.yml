# exp002 dry-run: 100-basin × 5-epoch sanity check on full date-period splits.
# Goal:
#   1. NOTE-001 第一项早期信号: 5-epoch min(Q̂) 趋势 (期望随训练单调增至非负)
#   2. NOTE-001 第二项: 验证 NH 标准 date-period splits 工作正常
#   3. validation NSE > 0
#   4. 估算 1 epoch 实际 wall-time，外推 30-epoch × 671 basins 预算

experiment_name: exp002_dryrun_100basins

run_dir: /home/qingsong/桌面/代码仓库/Reliability-Control-Streamflow-CP/experiments/exp002/results

# 100-basin subset for dry-run (reuses gonogo's curated balanced 100-list)
train_basin_file: /home/qingsong/桌面/代码仓库/Reliability-Control-Streamflow-CP/experiments/exp001_gonogo/basin_list_100.txt
validation_basin_file: /home/qingsong/桌面/代码仓库/Reliability-Control-Streamflow-CP/experiments/exp001_gonogo/basin_list_100.txt
test_basin_file: /home/qingsong/桌面/代码仓库/Reliability-Control-Streamflow-CP/experiments/exp001_gonogo/basin_list_100.txt

# Date-period splits (D-007 锁定): water-year-aware boundaries
train_start_date: '01/10/1980'
train_end_date: '30/09/1990'
validation_start_date: '01/10/1990'
validation_end_date: '30/09/2000'
test_start_date: '01/10/2000'
test_end_date: '30/09/2014'

seed: 42
device: cuda:0

# Validation: every epoch + on full validation basin set so cal scores are usable
validate_every: 1
validate_n_random_basins: 100
metrics:
- NSE

model: cudalstm
head: regression

hidden_size: 64
initial_forget_bias: 3
output_dropout: 0.4
output_activation: linear

optimizer: Adam
loss: NSE
learning_rate:
    0: 1e-3
    3: 5e-4
batch_size: 128
epochs: 5

predict_last_n: 1
seq_length: 365
num_workers: 4

save_weights_every: 1
save_validation_results: True

dataset: camels_us
data_dir: /home/qingsong/桌面/代码仓库/Reliability-Control-Streamflow-CP/data/raw/CAMELS_US

forcings:
- daymet

dynamic_inputs:
- prcp(mm/day)
- srad(W/m2)
- tmax(C)
- tmin(C)
- vp(Pa)

target_variables:
- QObs(mm/d)

static_attributes:
- elev_mean
- slope_mean
- area_gages2
- frac_forest
- lai_max
- lai_diff
- gvf_max
- gvf_diff
- soil_depth_pelletier
- soil_depth_statsgo
- soil_porosity
- soil_conductivity
- max_water_content
- sand_frac
- silt_frac
- clay_frac
- carbonate_rocks_frac
- geol_permeability
- p_mean
- pet_mean
- aridity
- frac_snow
- high_prec_freq
- high_prec_dur
- low_prec_freq
- low_prec_dur
