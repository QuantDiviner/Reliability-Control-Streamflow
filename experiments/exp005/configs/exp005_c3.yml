# exp005 — Lean MVP, C0 condition (clean forcings)
#
# 20 synthetic basins generated by HBV-Lite passing real CAMELS-US daymet
# forcings. Target Q is HBV synthetic + 5% iid Gaussian noise. Forcings are
# the original (unperturbed) CAMELS Daymet — i.e., what HBV used to produce Q.
# Expected: LSTM should reconstruct the HBV transfer function nearly perfectly,
# residuals should be ~iid (low AR1).
#
# Authority chain:
#   - PROJECT_CHARTER §2.2 (M1 frozen): alpha=0.10, tier_scheme
#   - PROJECT_CHARTER §2.3 (M2 三级): cudalstm, hidden=64, batch=128, seq=365
#   - exp005 plan v2 (Lean MVP, D-030): C0 + C3 only
#   - exp005 metadata.json

experiment_name: exp005_c3_perturbed

run_dir: /home/qingsong/桌面/代码仓库/Reliability-Control-Streamflow-CP/experiments/exp005/results

train_basin_file: /home/qingsong/桌面/代码仓库/Reliability-Control-Streamflow-CP/experiments/exp005/data/synthetic_camels/basin_list_20.txt
validation_basin_file: /home/qingsong/桌面/代码仓库/Reliability-Control-Streamflow-CP/experiments/exp005/data/synthetic_camels/basin_list_20.txt
test_basin_file: /home/qingsong/桌面/代码仓库/Reliability-Control-Streamflow-CP/experiments/exp005/data/synthetic_camels/basin_list_20.txt

# Same date splits as exp002 (water-year-aware).
train_start_date: '01/10/1980'
train_end_date: '30/09/1990'
validation_start_date: '01/10/1990'
validation_end_date: '30/09/2000'
test_start_date: '01/10/2000'
test_end_date: '30/09/2014'

seed: 42
device: cuda:0

validate_every: 5
validate_n_random_basins: 20
metrics:
- NSE

model: cudalstm
head: regression
output_activation: linear

hidden_size: 64
initial_forget_bias: 3
output_dropout: 0.4

optimizer: Adam
loss: NSE
learning_rate:
    0: 1e-3
    10: 5e-4
    20: 1e-4
batch_size: 128
epochs: 30

predict_last_n: 1
seq_length: 365
num_workers: 4

save_weights_every: 10
save_validation_results: True

# Synthetic CAMELS-US format dataset (P + T perturbed condition)
dataset: camels_us
data_dir: /home/qingsong/桌面/代码仓库/Reliability-Control-Streamflow-CP/experiments/exp005/data/synthetic_camels/c3

forcings:
- daymet

dynamic_inputs:
- prcp(mm/day)
- srad(W/m2)
- tmax(C)
- tmin(C)
- vp(Pa)

target_variables:
- QObs(mm/d)

# Same static attributes as exp002 baseline (frozen M2 三级 architecture).
static_attributes:
- elev_mean
- slope_mean
- area_gages2
- frac_forest
- lai_max
- lai_diff
- gvf_max
- gvf_diff
- soil_depth_pelletier
- soil_depth_statsgo
- soil_porosity
- soil_conductivity
- max_water_content
- sand_frac
- silt_frac
- clay_frac
- carbonate_rocks_frac
- geol_permeability
- p_mean
- pet_mean
- aridity
- frac_snow
- high_prec_freq
- high_prec_dur
- low_prec_freq
- low_prec_dur
