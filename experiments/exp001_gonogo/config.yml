# Go/no-go experiment: 100-basin HSCC feasibility check
# Goal: verify C1 hypothesis — global CP masks per-stratum conditional coverage failures
# Device: cpu (macOS) — switch to cuda:0 on Linux GPU machine
# Epochs: 3 (minimal — just enough to get reasonable predictions for CP analysis)

experiment_name: exp001_gonogo_100basins

# Run directory: results go inside experiments/exp001_gonogo/results/
run_dir: /Users/qingsongshan/Desktop/代码仓库/Reliability-Control-Streamflow-CP/experiments/exp001_gonogo/results

train_basin_file: /Users/qingsongshan/Desktop/代码仓库/Reliability-Control-Streamflow-CP/experiments/exp001_gonogo/basin_list_100.txt
validation_basin_file: /Users/qingsongshan/Desktop/代码仓库/Reliability-Control-Streamflow-CP/experiments/exp001_gonogo/basin_list_100.txt
test_basin_file: /Users/qingsongshan/Desktop/代码仓库/Reliability-Control-Streamflow-CP/experiments/exp001_gonogo/basin_list_100.txt

# CAMELS-US standard periods
# Train: 1999-2008 (10 yr); Calibration CP: 1989-1999 (10 yr); Test: 1980-1989 (10 yr)
train_start_date: '01/10/1999'
train_end_date: '30/09/2008'
validation_start_date: '01/10/1989'
validation_end_date: '30/09/1999'
test_start_date: '01/10/1980'
test_end_date: '30/09/1989'

seed: 42

# CPU for macOS — change to cuda:0 on Linux GPU machine
device: cpu

# Validation
validate_every: 1
validate_n_random_basins: 20
metrics:
- NSE

# Model: cudalstm runs on CPU too (despite the name)
model: cudalstm
head: regression

hidden_size: 64
initial_forget_bias: 3
output_dropout: 0.4
output_activation: linear

# Training
optimizer: Adam
loss: NSE
learning_rate:
    0: 1e-3
    1: 5e-4
batch_size: 128
epochs: 3

predict_last_n: 1
seq_length: 365
num_workers: 4

save_weights_every: 1
save_validation_results: True

# Data
dataset: camels_us
data_dir: /Users/qingsongshan/Desktop/代码仓库/Reliability-Control-Streamflow-CP/data/raw/CAMELS_US

forcings:
- daymet

dynamic_inputs:
- prcp(mm/day)
- srad(W/m2)
- tmax(C)
- tmin(C)
- vp(Pa)

target_variables:
- QObs(mm/d)

static_attributes:
- elev_mean
- slope_mean
- area_gages2
- frac_forest
- lai_max
- lai_diff
- gvf_max
- gvf_diff
- soil_depth_pelletier
- soil_depth_statsgo
- soil_porosity
- soil_conductivity
- max_water_content
- sand_frac
- silt_frac
- clay_frac
- carbonate_rocks_frac
- geol_permeability
- p_mean
- pet_mean
- aridity
- frac_snow
- high_prec_freq
- high_prec_dur
- low_prec_freq
- low_prec_dur
